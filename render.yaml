services:
  - type: web
    name: gradaroo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
