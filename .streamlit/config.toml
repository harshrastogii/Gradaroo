[client]
# Removes the top-right hamburger/toolbar menu (System/Light/Dark/Print/Made with Streamlit)
toolbarMode = "minimal"
# Don't surface errors to end users in the UI
showErrorDetails = false

[browser]
gatherUsageStats = false

[theme]
# Lock the look to match the app's design (warm paper + ink), so users can't
# flip it into dark mode and break the styling.
base = "light"
primaryColor = "#bc4514"
backgroundColor = "#faf6f0"
secondaryBackgroundColor = "#ffffff"
textColor = "#1c1917"
font = "sans serif"
